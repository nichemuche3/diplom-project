version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: shop_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"  # Проброс на другой порт, чтобы не конфликтовать с локальной PostgreSQL
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shop_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: shop_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - shop_network
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: shop_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ../backend:/app  # Монтируем код из Windows
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - db
      - redis
    networks:
      - shop_network
    restart: unless-stopped

  celery:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: shop_celery
    command: celery -A config worker -l info
    volumes:
      - ../backend:/app
    env_file:
      - ../.env
    depends_on:
      - web
      - redis
      - db
    networks:
      - shop_network
    restart: unless-stopped

  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: shop_celery_beat
    command: celery -A config beat -l info
    volumes:
      - ../backend:/app
    env_file:
      - ../.env
    depends_on:
      - web
      - redis
      - db
    networks:
      - shop_network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: shop_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - shop_network
    restart: unless-stopped

networks:
  shop_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume: